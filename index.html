<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeighLess - Smart Inventory</title>
    
    <!-- อัปเกรด React และ Babel เป็นเวอร์ชันล่าสุดเพื่อแก้ปัญหาหน้าจอขาวบนมือถือ -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .gemini-glow { box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); border: 2px solid #a855f7; }
        .gemini-gradient { background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <!-- ระบบดักจับ Error (ถ้าโค้ดพัง จะแสดงสีแดงตรงนี้แทนหน้าจอขาว) -->
    <div id="error-log" style="color: red; padding: 20px; font-weight: bold; font-family: monospace;"></div>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('error-log').innerHTML += `<p>💥 Error: ${message} <br/>(Line: ${lineno}, Col: ${colno})</p>`;
        };
    </script>

    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // ⚠️ นำ URL จาก Google Apps Script มาใส่ตรงนี้
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzIPeYVrS6Jrx4KFTnZWrETQq3XypZOKEebhYVh7xrsovV_qv_L60mzvETLZl_hDSpc/exec";

        // ⚙️ ค่าที่ปรับได้สำหรับ Live AI Scan
        const SCAN_INTERVAL_MS = 2500;       // ความถี่ในการยิงภาพไปวิเคราะห์ (ms)
        const CONF_AUTO_SELECT = 0.90;       // >= ค่านี้ = Auto-select (ให้ผู้ใช้ยืนยันแค่ ใช่/ไม่ใช่)
        const CONF_SUGGEST = 0.60;           // >= ค่านี้ (แต่ < AUTO) = โชว์ตัวเลือกให้แตะเลือก
                                              // < CONF_SUGGEST = ไม่แน่ใจ ให้สแกนใหม่/พิมพ์รหัสเอง

        const dict = {
            th: {
                sysName: "WeighLess Inventory", login: "เข้าสู่ระบบ", register: "สมัครสมาชิก", empId: "รหัสพนักงาน", pass: "รหัสผ่าน",
                name: "ชื่อ-นามสกุล", dept: "แผนก", btnLogin: "เข้าสู่ระบบ", btnReg: "สมัครบัญชีใหม่", logout: "ออกจากระบบ", 
                role_Admin: "ผู้ดูแลระบบ", role_Supervisor: "หัวหน้างาน", role_Staff: "พนักงาน",
                createTask: "มอบหมายงานใหม่", article: "รหัสสินค้า", aisle: "Aisle", bay: "Bay", btnCreate: "สร้างงาน",
                taskList: "ความคืบหน้าการนับสต็อก", viewReport: "รายงาน (Log)", export: "Export Excel",
                myTasks: "งานที่ต้องทำ", countTarget: "เป้าหมายการนับ", weight: "น้ำหนัก (กิโลกรัม)", 
                takePhoto: "📸 ถ่ายภาพหลักฐาน", retakePhoto: "📸 ถ่ายภาพใหม่", btnSubmit: "บันทึกเข้าระบบ",
                noTask: "ไม่มีงานค้างอยู่ในขณะนี้", pending: "รอดำเนินการ", done: "เสร็จสิ้น",
                scanToVerify: "กรอกรหัส หรือ สแกนด้วยกล้อง", lookupBtn: "ค้นหา", productFound: "สินค้าที่พบ", mismatchWarn: "รหัสสินค้าไม่ตรงกับงานที่ได้รับมอบหมาย!",
                searchPlaceholder: "🔍 ค้นหารหัส / ชื่อสินค้า..."
            },
            en: {
                sysName: "WeighLess Inventory", login: "Login", register: "Register", empId: "Emp ID", pass: "Password",
                name: "Full Name", dept: "Department", btnLogin: "Sign In", btnReg: "Create Account", logout: "Logout", 
                role_Admin: "Admin", role_Supervisor: "Supervisor", role_Staff: "Staff",
                createTask: "Assign Task", article: "Article", aisle: "Aisle", bay: "Bay", btnCreate: "Create Task",
                taskList: "Counting Progress", viewReport: "Report Log", export: "Export Excel",
                myTasks: "My Tasks", countTarget: "Count Target", weight: "Weight (kg)", 
                takePhoto: "📸 Take Evidence Photo", retakePhoto: "📸 Retake Photo", btnSubmit: "Save to System",
                noTask: "No pending tasks", pending: "Pending", done: "Done",
                scanToVerify: "Enter Article or Scan", lookupBtn: "Search", productFound: "Product Found", mismatchWarn: "Article mismatch with assigned task!",
                searchPlaceholder: "🔍 Search Article / Name..."
            }
        };

        const { useState, useEffect, useRef } = React;

        const compressImage = (base64, maxWidth = 800, quality = 0.7) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scaleSize = maxWidth / img.width;
                    if (scaleSize < 1) { canvas.width = maxWidth; canvas.height = img.height * scaleSize; } 
                    else { canvas.width = img.width; canvas.height = img.height; }
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = reject;
            });
        };

        function App() {
            const [lang, setLang] = useState('th');
            const [user, setUser] = useState(null);
            const t = dict[lang];

            const fetchGAS = async (payload) => {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
                return res.json();
            };

            const verifyArticleMatch = (scanned, assigned) => { return String(scanned).trim() === String(assigned).trim(); };

            if (!user) return <AuthScreen t={t} lang={lang} setLang={setLang} setUser={setUser} fetchGAS={fetchGAS} />;

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    <header className="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md">
                        <div>
                            <h1 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">{t.sysName}</h1>
                            <p className="text-sm opacity-80">{user.name} ({user.dept})</p>
                        </div>
                        <div className="flex gap-2 items-center">
                            <button onClick={() => setLang(lang === 'th' ? 'en' : 'th')} className="text-xs font-bold uppercase border border-slate-600 rounded px-2 py-1 text-slate-300 hover:bg-slate-700">
                                {lang === 'th' ? 'EN' : 'TH'}
                            </button>
                            <button onClick={() => setUser(null)} className="text-sm bg-slate-800 px-3 py-1 rounded border border-slate-700 hover:bg-slate-700 transition">{t.logout}</button>
                        </div>
                    </header>
                    <main className="flex-1 p-4 max-w-6xl w-full mx-auto">
                        {(user.role === 'Admin' || user.role === 'Supervisor') 
                            ? <SupervisorPanel user={user} t={t} fetchGAS={fetchGAS} /> 
                            : <StaffPanel user={user} t={t} fetchGAS={fetchGAS} verifyMatch={verifyArticleMatch} compressImage={compressImage} />
                        }
                    </main>
                </div>
            );
        }

        // ==========================================
        // หน้า Login / Register
        // ==========================================
        function AuthScreen({ t, lang, setLang, setUser, fetchGAS }) {
            const [isReg, setIsReg] = useState(false);
            const [form, setForm] = useState({ empId: '', password: '', name: '', dept: '' });
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault(); setLoading(true);
                try {
                    const res = await fetchGAS({ action: isReg ? 'register' : 'login', ...form });
                    if (res.success) { 
                        if(isReg) { alert(res.message); setIsReg(false); } 
                        else { setUser(res.user); }
                    } else alert(res.message);
                } catch (err) { alert("Network Error: ตรวจสอบ URL ของ GAS"); }
                finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4 relative">
                    <button onClick={() => setLang(lang === 'th' ? 'en' : 'th')} className="absolute top-4 right-4 text-xs font-bold uppercase border rounded px-3 py-1 bg-white text-slate-600 hover:bg-slate-200 shadow-sm">
                        {lang === 'th' ? 'EN' : 'TH'}
                    </button>
                    <div className="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-emerald-500 mb-2">WeighLess</h2>
                            <p className="text-slate-500 font-medium">{isReg ? t.register : "Smart Inventory Ecosystem"}</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input required placeholder={t.empId} className="w-full p-4 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 transition"
                                value={form.empId} onChange={e => setForm({...form, empId: e.target.value})} />
                            
                            {isReg && <input required placeholder={t.name} className="w-full p-4 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 transition"
                                value={form.name} onChange={e => setForm({...form, name: e.target.value})} />}
                            
                            {isReg && 
                                <select required className="w-full p-4 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 transition"
                                    value={form.dept} onChange={e => setForm({...form, dept: e.target.value})}>
                                    <option value="" disabled>-- {t.dept} --</option>
                                    <option value="เบเกอรี">เบเกอรี (Bakery)</option>
                                    <option value="ผักและผลไม้">ผักและผลไม้ (Produce)</option>
                                    <option value="อาหารทะเล">อาหารทะเล (Seafood)</option>
                                    <option value="เนื้อสัตว์">เนื้อสัตว์ (Meat)</option>
                                    <option value="ผลิตภัณฑ์แช่แข็ง">ผลิตภัณฑ์แช่แข็ง (Frozen)</option>
                                </select>
                            }

                            <input required type="password" placeholder={t.pass} className="w-full p-4 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 transition"
                                value={form.password} onChange={e => setForm({...form, password: e.target.value})} />
                            
                            <button disabled={loading} type="submit" className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold text-lg hover:bg-blue-700 shadow-md flex justify-center items-center transition disabled:opacity-50">
                                {loading ? <div className="spinner border-l-white"></div> : (isReg ? t.btnReg : t.btnLogin)}
                            </button>
                        </form>
                        <div className="mt-6 text-center">
                            <button type="button" onClick={() => setIsReg(!isReg)} className="text-sm text-blue-600 font-medium hover:underline">
                                {isReg ? (lang === 'th' ? "มีบัญชีแล้ว? เข้าสู่ระบบ" : "Have an account? Login") : (lang === 'th' ? "พนักงานใหม่? สมัครบัญชี" : "New staff? Register")}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 🌟 Live AI Scan Modal
        // เปิดกล้องค้าง แล้วยิงเฟรมไปให้ Gemini วิเคราะห์เป็นระยะ
        // ตัดสินใจ UI ตามระดับ Confidence:
        //   >= CONF_AUTO_SELECT  -> Auto-select + popup ให้ยืนยัน ใช่/ไม่ใช่
        //   >= CONF_SUGGEST      -> โชว์ 3 ตัวเลือกให้แตะเลือก (Human-in-the-loop)
        //   < CONF_SUGGEST       -> แจ้งเตือนไม่แน่ใจ ให้สแกนใหม่/พิมพ์รหัสเอง
        // ==========================================
        function LiveScanModal({ onClose, onConfirm, fetchGAS }) {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const streamRef = useRef(null);
            const intervalRef = useRef(null);
            const busyRef = useRef(false);
            const pausedRef = useRef(false);

            const [status, setStatus] = useState('starting'); // starting | scanning | error
            const [lowConfMsg, setLowConfMsg] = useState('');
            const [autoCandidate, setAutoCandidate] = useState(null); // { pred }
            const [candidates, setCandidates] = useState(null); // array

            useEffect(() => {
                let active = true;
                (async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: { ideal: "environment" }, width: { ideal: 640 }, height: { ideal: 480 } }
                        });
                        if (!active) { stream.getTracks().forEach(tr => tr.stop()); return; }
                        streamRef.current = stream;
                        if (videoRef.current) {
                            videoRef.current.srcObject = stream;
                            await videoRef.current.play();
                        }
                        setStatus('scanning');
                        intervalRef.current = setInterval(captureAndAnalyze, SCAN_INTERVAL_MS);
                    } catch (e) {
                        setStatus('error');
                    }
                })();
                return () => {
                    active = false;
                    if (intervalRef.current) clearInterval(intervalRef.current);
                    if (streamRef.current) streamRef.current.getTracks().forEach(tr => tr.stop());
                };
                // eslint-disable-next-line
            }, []);

            const captureAndAnalyze = async () => {
                if (busyRef.current || pausedRef.current) return;
                const video = videoRef.current;
                if (!video || !video.videoWidth) return;
                busyRef.current = true;
                try {
                    const canvas = canvasRef.current;
                    const w = 420;
                    const h = Math.round(video.videoHeight * (w / video.videoWidth));
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(video, 0, 0, w, h);
                    const frameBase64 = canvas.toDataURL('image/jpeg', 0.55);

                    const res = await fetchGAS({ action: 'analyzeImage', imageBase64: frameBase64 });

                    if (!res.success || !res.predictions || res.predictions.length === 0) return;

                    const top = res.predictions[0];
                    if (top.confidence >= CONF_AUTO_SELECT) {
                        pausedRef.current = true;
                        setAutoCandidate(top);
                    } else if (top.confidence >= CONF_SUGGEST) {
                        pausedRef.current = true;
                        setCandidates(res.predictions);
                    } else {
                        setLowConfMsg('ไม่แน่ใจ กรุณาสแกนใหม่ให้ชัดขึ้น หรือพิมพ์รหัสเอง');
                        clearTimeout(window.__lowConfTimer);
                        window.__lowConfTimer = setTimeout(() => setLowConfMsg(''), 2200);
                    }
                } catch (e) {
                    // ยิงพลาดรอบนี้ ไม่เป็นไร รอบหน้าลองใหม่
                } finally {
                    busyRef.current = false;
                }
            };

            const resumeScanning = () => {
                setAutoCandidate(null);
                setCandidates(null);
                pausedRef.current = false;
            };

            const confirmPick = (pred) => { onConfirm(pred); };

            return (
                <div className="fixed inset-0 z-50 bg-black flex flex-col">
                    <div className="flex justify-between items-center p-4 bg-black/70 text-white relative z-30">
                        <span className="font-bold gemini-gradient text-lg">✨ AI Live Scan</span>
                        <button onClick={onClose} className="bg-white/10 hover:bg-white/20 w-9 h-9 rounded-full flex items-center justify-center transition">✕</button>
                    </div>

                    <div className="flex-1 relative overflow-hidden">
                        <video ref={videoRef} className="w-full h-full object-cover" playsInline muted></video>
                        <canvas ref={canvasRef} className="hidden"></canvas>

                        {status === 'starting' && (
                            <div className="absolute inset-0 flex items-center justify-center text-white gap-2">
                                <div className="spinner border-l-white"></div> กำลังเปิดกล้อง...
                            </div>
                        )}
                        {status === 'error' && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center text-white p-6 text-center gap-3">
                                <p>ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตสิทธิ์กล้องในเบราว์เซอร์แล้วลองใหม่</p>
                                <button onClick={onClose} className="bg-white/10 px-4 py-2 rounded-xl">ปิด</button>
                            </div>
                        )}
                        {status === 'scanning' && !autoCandidate && !candidates && (
                            <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-black/60 text-white text-sm px-4 py-2 rounded-full flex items-center gap-2 whitespace-nowrap">
                                <span className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                                กำลังส่อง... เล็งกล้องไปที่สินค้าหรือป้ายราคา
                            </div>
                        )}
                        {lowConfMsg && (
                            <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-orange-500 text-white text-sm px-4 py-3 rounded-2xl shadow-lg max-w-[90%] text-center font-medium">
                                ⚠️ {lowConfMsg}
                            </div>
                        )}
                    </div>

                    {/* >= 90%: Auto-select ให้ยืนยัน ใช่/ไม่ใช่ */}
                    {autoCandidate && (
                        <div className="absolute inset-0 z-20 flex items-end justify-center bg-black/60">
                            <div className="bg-white w-full max-w-lg rounded-t-3xl p-6 pb-8" style={{animation: 'slideUp 0.3s ease-out'}}>
                                <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
                                <p className="text-xs font-black text-emerald-600 uppercase mb-2 tracking-wide">
                                    ✅ ตรงกัน {(autoCandidate.confidence * 100).toFixed(0)}%
                                    {autoCandidate.source === 'label' ? ' · 🏷️ อ่านจากป้าย' : ' · 👁️ วิเคราะห์จากภาพ'}
                                </p>
                                <h3 className="text-2xl font-black text-slate-800 mb-1">{autoCandidate.Item}</h3>
                                <p className="text-slate-500 mb-6">Article: {autoCandidate.Article}</p>
                                <p className="font-bold text-slate-700 mb-4">ใช่สินค้าชิ้นนี้ใช่ไหม?</p>
                                <div className="flex gap-3">
                                    <button onClick={resumeScanning} className="flex-1 bg-slate-100 text-slate-700 p-4 rounded-xl font-bold hover:bg-slate-200 transition">❌ ไม่ใช่</button>
                                    <button onClick={() => confirmPick(autoCandidate)} className="flex-1 bg-emerald-600 text-white p-4 rounded-xl font-bold hover:bg-emerald-700 transition">✅ ใช่ ยืนยัน</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 60-90%: โชว์ตัวเลือกให้แตะเลือก (Human-in-the-loop) */}
                    {candidates && (
                        <div className="absolute inset-0 z-20 flex items-end justify-center bg-black/60">
                            <div className="bg-white w-full max-w-lg rounded-t-3xl p-6 pb-8" style={{animation: 'slideUp 0.3s ease-out'}}>
                                <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
                                <h3 className="text-lg font-black gemini-gradient mb-1">✨ ใกล้เคียงหลายรายการ</h3>
                                <p className="text-sm text-slate-500 mb-4">Gemini ไม่มั่นใจ 100% กรุณาแตะเลือกรายการที่ตรง</p>
                                <div className="space-y-3 max-h-[45vh] overflow-y-auto pr-1 hide-scroll">
                                    {candidates.map((pred, idx) => (
                                        <div key={idx} onClick={() => confirmPick(pred)}
                                            className="p-4 border-2 border-slate-100 rounded-2xl hover:border-purple-500 hover:bg-purple-50 cursor-pointer flex justify-between items-center active:scale-[0.98] transition">
                                            <div className="flex items-center gap-3">
                                                <div className="w-9 h-9 rounded-full bg-purple-100 flex items-center justify-center text-purple-600 font-black">{idx + 1}</div>
                                                <div>
                                                    <p className="font-bold text-slate-800">{pred.Item}</p>
                                                    <p className="text-sm text-slate-500 flex items-center gap-1">
                                                        Article: {pred.Article}
                                                        <span className="text-slate-400">·</span>
                                                        <span className="text-slate-400">{pred.source === 'label' ? '🏷️ อ่านจากป้าย' : '👁️ วิเคราะห์จากภาพ'}</span>
                                                    </p>
                                                </div>
                                            </div>
                                            <span className={`text-xs font-black px-3 py-1.5 rounded-full border whitespace-nowrap ${pred.confidence > 0.75 ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-orange-100 text-orange-700 border-orange-200'}`}>
                                                {(pred.confidence * 100).toFixed(0)}%
                                            </span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={resumeScanning} className="w-full mt-4 bg-slate-100 text-slate-600 p-3 rounded-xl font-bold hover:bg-slate-200 transition">ไม่ใช่ทั้งหมด สแกนใหม่</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // แดชบอร์ด พนักงาน (Staff Panel & Gemini)
        // ==========================================
        function StaffPanel({ user, t, fetchGAS, verifyMatch, compressImage }) {
            const [tasks, setTasks] = useState([]);
            const [activeTask, setActiveTask] = useState(null);
            const [loading, setLoading] = useState(false);

            const [scanArticle, setScanArticle] = useState('');
            const [productDetail, setProductDetail] = useState(null);
            
            const [isScannerOpen, setIsScannerOpen] = useState(false);
            const [isLiveScanOpen, setIsLiveScanOpen] = useState(false);

            const [weight, setWeight] = useState('');
            const [imgBase64, setImgBase64] = useState('');

            useEffect(() => { loadTasks(); }, []);
            
            const loadTasks = async () => {
                setLoading(true);
                try {
                    const res = await fetchGAS({ action: 'getTasks', role: user.role, dept: user.dept });
                    if(res.success) setTasks(res.tasks.filter(t => t.Status !== 'Done'));
                } catch(e) { console.log(e); }
                setLoading(false);
            };

            const resetState = () => {
                setActiveTask(null); setScanArticle(''); setProductDetail(null); setWeight(''); 
                setImgBase64(''); setIsScannerOpen(false); setIsLiveScanOpen(false);
            };

            const handleLookup = async (manualArticle = scanArticle) => {
                if(!manualArticle) return;
                setLoading(true);
                const res = await fetchGAS({ action: 'lookup', article: manualArticle.trim() });
                if(res.success) { setProductDetail(res.product); } 
                else { alert(res.message); setProductDetail(null); }
                setLoading(false);
            };

            useEffect(() => {
                let html5QrCode;
                if(isScannerOpen) {
                    html5QrCode = new Html5Qrcode("reader");
                    html5QrCode.start(
                        { facingMode: "environment" },
                        { fps: 10, qrbox: { width: 250, height: 150 } },
                        (decodedText) => {
                            setScanArticle(decodedText);
                            handleLookup(decodedText);
                            html5QrCode.stop().then(() => setIsScannerOpen(false)).catch(() => setIsScannerOpen(false));
                        },
                        (errorMessage) => {}
                    ).catch((err) => { alert("Camera Error"); setIsScannerOpen(false); });
                }
                return () => { if (html5QrCode) { try { html5QrCode.stop().catch(e => console.log(e)); } catch(e) {} } };
            }, [isScannerOpen]);

            // เมื่อผู้ใช้ยืนยันตัวเลือกจาก Live AI Scan (ทั้งกรณี auto-select และกรณีเลือกจาก 3 ตัวเลือก)
            const handleLiveScanConfirm = (prediction) => {
                setScanArticle(prediction.Article);
                setProductDetail({ Article: prediction.Article, Item: prediction.Item });
                setIsLiveScanOpen(false);
            };

            const submitTask = async () => {
                if(!weight) return alert("กรุณากรอกน้ำหนัก / Please enter weight");
                if(!imgBase64) return alert("กรุณาถ่ายรูป / Please take photo");
                
                setLoading(true);
                const prevTasks = [...tasks]; 
                const submittedTaskId = activeTask.TaskID;
                const submittedArticle = activeTask.Article;
                
                try {
                    setTasks(prev => prev.filter(task => task.TaskID !== submittedTaskId));
                    resetState();

                    const compressedImg = await compressImage(imgBase64);
                    const res = await fetchGAS({
                        action: 'submitCount', taskId: submittedTaskId, empId: user.empId, 
                        article: submittedArticle, weight: weight, imageBase64: compressedImg
                    });

                    if(!res.success) throw new Error(res.message);

                } catch(e) { 
                    alert("⚠️ Network Error: ไม่สามารถบันทึกได้ ระบบจะนำงานกลับมาให้ทำรายการใหม่");
                    setTasks(prevTasks); 
                } finally { 
                    setLoading(false); 
                    loadTasks(); 
                }
            };

            if (activeTask) {
                const isMismatch = productDetail && !verifyMatch(productDetail.Article, activeTask.Article);

                return (
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 max-w-lg mx-auto">
                        <button onClick={resetState} className="text-slate-500 mb-4 font-bold flex items-center hover:text-slate-700 transition">
                            <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                            Back
                        </button>
                        
                        <div className="bg-slate-50 p-4 rounded-xl mb-6 border border-slate-200 shadow-inner">
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-xs text-slate-500 font-bold uppercase tracking-wider">{t.countTarget}</p>
                                    <h2 className="text-xl font-bold text-slate-800">{activeTask.Article}</h2>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs text-slate-500 font-bold uppercase tracking-wider">Aisle / Bay</p>
                                    <p className="font-bold text-blue-600">{activeTask.Aisle} / {activeTask.Bay}</p>
                                </div>
                            </div>
                        </div>

                        {/* 🌟 ปุ่มหลัก: เปิดกล้อง AI สแกนสด (แทนที่การถ่ายรูปแล้วรอผล) */}
                        <button 
                            onClick={() => setIsLiveScanOpen(true)}
                            className="w-full py-5 rounded-2xl font-black text-white gemini-glow bg-gradient-to-r from-blue-600 via-purple-600 to-pink-500 hover:opacity-90 transition flex flex-col items-center justify-center gap-1 shadow-md mb-6"
                        >
                            <span className="flex items-center gap-2 text-lg">📷✨ เปิดกล้อง AI สแกนสินค้า</span>
                            <span className="text-xs font-medium opacity-90">ส่องกล้องไปที่สินค้า ไม่ต้องกดถ่าย ระบบวิเคราะห์อัตโนมัติ</span>
                        </button>

                        {isLiveScanOpen && (
                            <LiveScanModal
                                fetchGAS={fetchGAS}
                                onClose={() => setIsLiveScanOpen(false)}
                                onConfirm={handleLiveScanConfirm}
                            />
                        )}

                        <label className="block text-sm font-bold text-slate-700 mb-2">{t.scanToVerify}</label>
                        <div className="flex gap-2 mb-4">
                            <input type="text" placeholder="Article Code" className="flex-1 p-3 border-2 rounded-xl outline-none focus:border-blue-500 text-lg bg-slate-50 focus:bg-white transition"
                                value={scanArticle} onChange={e => setScanArticle(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleLookup(scanArticle)} />
                            
                            <button onClick={() => setIsScannerOpen(!isScannerOpen)} className="bg-blue-600 text-white px-4 rounded-xl flex items-center justify-center text-xl hover:bg-blue-700">
                                📷
                            </button>

                            <button onClick={() => handleLookup(scanArticle)} disabled={loading} className="bg-slate-800 text-white px-4 rounded-xl font-bold flex items-center justify-center min-w-[80px]">
                                {loading ? <div className="spinner border-l-white"></div> : t.lookupBtn}
                            </button>
                        </div>

                        {isScannerOpen && (
                            <div className="w-full mb-4" style={{animation: 'fadeIn 0.3s ease-in-out'}}>
                                <div id="reader" className="w-full rounded-xl overflow-hidden shadow bg-black min-h-[250px]"></div>
                                <button onClick={() => setIsScannerOpen(false)} className="w-full mt-2 bg-red-50 text-red-600 p-3 rounded-xl font-bold hover:bg-red-100 transition border border-red-200">
                                    ❌ Close Scanner
                                </button>
                            </div>
                        )}

                        {productDetail && (
                            <div className={`p-4 rounded-xl mb-6 border ${isMismatch ? 'bg-red-50 border-red-200' : 'bg-emerald-50 border-emerald-200'}`}>
                                <p className="text-xs text-slate-500 uppercase font-bold mb-1">{t.productFound}</p>
                                <p className={`font-bold text-xl ${isMismatch ? 'text-red-700' : 'text-emerald-700'}`}>{productDetail.Item}</p>
                                {isMismatch && <p className="text-red-600 text-sm font-bold mt-2 flex items-center gap-1">⚠️ {t.mismatchWarn}</p>}
                            </div>
                        )}

                        {productDetail && (
                            <div style={{animation: 'fadeIn 0.3s ease-in-out'}}>
                                <label className="block text-sm font-bold text-slate-700 mb-2">Weight Data (kg)</label>
                                <input type="number" step="0.01" placeholder={t.weight} className="w-full p-4 border-2 rounded-xl text-xl mb-4 focus:border-blue-500 outline-none bg-slate-50 focus:bg-white transition text-center font-bold"
                                    value={weight} onChange={e => setWeight(e.target.value)} />

                                <label className="block w-full text-center p-4 border-2 border-dashed border-slate-300 rounded-xl cursor-pointer hover:bg-slate-50 mb-6 transition">
                                    <span className="text-slate-600 font-bold flex flex-col items-center gap-2">
                                        <svg className="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                        {imgBase64 ? t.retakePhoto : t.takePhoto}
                                    </span>
                                    <input type="file" accept="image/*" capture="environment" onChange={(e) => {
                                        const file = e.target.files[0]; if(!file) return;
                                        const reader = new FileReader(); reader.onloadend = () => setImgBase64(reader.result); reader.readAsDataURL(file);
                                    }} className="hidden" />
                                </label>
                                {imgBase64 && <img src={imgBase64} alt="Preview" className="w-full h-40 object-cover rounded-xl mb-6 shadow-sm border" />}

                                <button onClick={submitTask} disabled={loading || isMismatch} className="w-full bg-emerald-600 text-white p-4 rounded-xl font-black text-lg hover:bg-emerald-700 shadow-md flex justify-center disabled:opacity-50 transition">
                                    {loading ? <div className="spinner border-l-white"></div> : t.btnSubmit}
                                </button>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="max-w-lg mx-auto">
                    <h2 className="text-xl font-bold mb-4 text-slate-800 border-b pb-2">{t.myTasks} ({user.dept})</h2>
                    {loading && <p className="text-center text-slate-500 my-8">Loading Data...</p>}
                    {!loading && tasks.length === 0 && <div className="p-8 text-center bg-white rounded-2xl shadow-sm text-slate-500 border border-slate-200">✅ {t.noTask}</div>}
                    <div className="grid gap-3">
                        {tasks.map(task => (
                            <div key={task.TaskID} onClick={() => setActiveTask(task)} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-blue-500 cursor-pointer hover:shadow-md transition flex justify-between items-center group">
                                <div>
                                    <div className="font-bold text-lg text-slate-800 group-hover:text-blue-700 transition">Article: {task.Article}</div>
                                    <div className="text-sm text-slate-500 mt-1 flex items-center gap-2">
                                        <span className="bg-slate-100 px-2 py-0.5 rounded">Aisle {task.Aisle}</span> 
                                        <span className="bg-slate-100 px-2 py-0.5 rounded">Bay {task.Bay}</span>
                                    </div>
                                </div>
                                <div className="bg-blue-50 text-blue-700 px-4 py-2 rounded-xl text-sm font-bold shadow-sm">Start &rarr;</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ==========================================
        // แดชบอร์ด หัวหน้างาน (Admin & Supervisor)
        // ==========================================
        function SupervisorPanel({ user, t, fetchGAS }) {
            const [view, setView] = useState('tasks');
            const [form, setForm] = useState({ dept: user.role === 'Admin' ? '' : user.dept, article: '', aisle: '', bay: '' });
            const [tasks, setTasks] = useState([]);
            const [submissions, setSubmissions] = useState([]);
            const [loading, setLoading] = useState(false);
            
            const [previewTasks, setPreviewTasks] = useState(null);
            
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [filterDept, setFilterDept] = useState('');
            const [searchQuery, setSearchQuery] = useState(''); 
            const [taskSearchQuery, setTaskSearchQuery] = useState(''); 

            const uniqueDepts = Array.from(new Set(tasks.map(task => task.Dept).filter(Boolean)));

            const loadData = async (isPolling = false) => {
                if (!isPolling) setLoading(true);
                const [resTasks, resSubs] = await Promise.all([
                    fetchGAS({ action: 'getTasks', role: user.role, dept: user.dept }),
                    view === 'report' ? fetchGAS({ action: 'getSubmissions' }) : Promise.resolve({ success: true, submissions: [] })
                ]);
                if (resTasks.success) setTasks(resTasks.tasks);
                if (resSubs.success && view === 'report') setSubmissions(resSubs.submissions);
                if (!isPolling) setLoading(false);
            };

            useEffect(() => { 
                loadData(); 
                const interval = setInterval(() => { loadData(true); }, 10000); 
                return () => clearInterval(interval);
            }, [view]);

            const handleCreate = async (e) => {
                e.preventDefault(); setLoading(true);
                const res = await fetchGAS({ action: 'createTask', ...form });
                if(res.success) { alert(res.message); setForm({...form, article: '', aisle: '', bay: ''}); loadData(); }
                setLoading(false);
            };

            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                        const excelRows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                        const formattedTasks = excelRows.map(row => {
                            const getVal = (key) => {
                                const foundKey = Object.keys(row).find(k => k.trim().toLowerCase() === key.toLowerCase());
                                return foundKey ? row[foundKey] : '';
                            };
                            return { aisle: getVal('Aisle'), bay: getVal('Bay'), dept: getVal('Dept'), article: getVal('Article') };
                        }).filter(t => String(t.article).trim() !== '');
                        if(formattedTasks.length === 0) return alert("Invalid Format (Need: Aisle, Bay, Dept, Article)");
                        setPreviewTasks(formattedTasks);
                    } catch(err) { alert("Invalid Excel File"); }
                    e.target.value = null; 
                };
                reader.readAsBinaryString(file);
            };

            const confirmBulkUpload = async () => {
                setLoading(true);
                const response = await fetchGAS({ action: 'createTasksBulk', tasks: previewTasks });
                if (response.success) { alert("Bulk Upload Success!"); setPreviewTasks(null); loadData(); } 
                else { alert("Error: " + response.message); }
                setLoading(false);
            };

            const filteredTasksForDashboard = tasks.filter(t => {
                if (!taskSearchQuery) return true;
                return String(t.Article || '').toLowerCase().includes(taskSearchQuery.toLowerCase().trim());
            });

            const groupedTasks = Object.values(filteredTasksForDashboard.reduce((acc, t) => {
                const key = `${t.Dept}_${t.Aisle}_${t.Bay}`;
                if (!acc[key]) acc[key] = { dept: t.Dept, aisle: t.Aisle, bay: t.Bay, tasks: [], done: 0, total: 0 };
                acc[key].tasks.push(t); acc[key].total++;
                if (t.Status === 'Done') acc[key].done++;
                return acc;
            }, {}));
            
            const filteredSubmissions = submissions.filter(s => {
                const mt = tasks.find(t => String(t.TaskID) === String(s.TaskID)) || {};
                const recordDept = mt.Dept || s.Dept || "N/A";
                
                if (filterDept && recordDept !== filterDept) return false;
                
                if (startDate || endDate) {
                    if (!s.Date) return false;
                    const sDateStr = String(s.Date).trim();
                    let compareDate = null;
                    if (sDateStr.includes('-')) {
                        const p = sDateStr.split('-'); compareDate = p[0].length === 4 ? new Date(`${p[0]}-${p[1]}-${p[2]}T00:00:00`) : new Date(`${p[2]}-${p[1]}-${p[0]}T00:00:00`);
                    } else if (sDateStr.includes('/')) {
                        const p = sDateStr.split('/'); compareDate = p[0].length === 4 ? new Date(`${p[0]}-${p[1]}-${p[2]}T00:00:00`) : new Date(`${p[2]}-${p[1]}-${p[0]}T00:00:00`);
                    } else { compareDate = new Date(sDateStr); }
                    if (compareDate && !isNaN(compareDate.getTime())) {
                        if (startDate && compareDate < new Date(startDate + "T00:00:00")) return false;
                        if (endDate && compareDate > new Date(endDate + "T23:59:59")) return false;
                    }
                }

                if (searchQuery) {
                    const query = searchQuery.toLowerCase().trim();
                    const article = String(s.Article || '').toLowerCase();
                    const itemName = String(s.Item || '').toLowerCase(); 
                    const empId = String(s.EmpID || '').toLowerCase();
                    
                    if (!article.includes(query) && !itemName.includes(query) && !empId.includes(query)) {
                        return false;
                    }
                }

                return true;
            });

            const exportExcel = () => {
                const data = filteredSubmissions.map(s => {
                    const mt = tasks.find(t => String(t.TaskID) === String(s.TaskID)) || {};
                    return { "Date": s.Date || '-', "Time": s.Time || '-', "Dept": mt.Dept || s.Dept || "N/A", "Aisle": mt.Aisle || "N/A", "Bay": mt.Bay || "N/A", "Article": s.Article, "Weight": s.Weight, "EmpID": s.EmpID };
                });
                XLSX.writeFile(XLSX.utils.book_append_sheet(XLSX.utils.book_new(), XLSX.utils.json_to_sheet(data), "Report"), "StockCount_Report.xlsx");
            };

            return (
                <div>
                    <div className="flex gap-2 mb-6">
                        <button onClick={()=>setView('tasks')} className={`flex-1 py-3 rounded-xl font-bold transition-colors ${view==='tasks'?'bg-blue-600 text-white shadow-md':'bg-white text-slate-600 border'}`}>1. Task Dashboard</button>
                        <button onClick={()=>setView('report')} className={`flex-1 py-3 rounded-xl font-bold transition-colors ${view==='report'?'bg-blue-600 text-white shadow-md':'bg-white text-slate-600 border'}`}>2. {t.viewReport}</button>
                    </div>

                    {view === 'tasks' && !previewTasks && (
                        <div className="grid lg:grid-cols-3 gap-6 items-start">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border lg:col-span-1">
                                <h3 className="font-bold text-lg mb-4 text-slate-800">{t.createTask}</h3>
                                <form onSubmit={handleCreate} className="space-y-3 mb-6">
                                    <input required placeholder={t.article} className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 bg-slate-50" value={form.article} onChange={e=>setForm({...form, article: e.target.value})} />
                                    <div className="flex gap-2">
                                        <input required placeholder={t.aisle} className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 bg-slate-50" value={form.aisle} onChange={e=>setForm({...form, aisle: e.target.value})} />
                                        <input required placeholder={t.bay} className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 bg-slate-50" value={form.bay} onChange={e=>setForm({...form, bay: e.target.value})} />
                                    </div>
                                    {user.role === 'Admin' && (
                                        <select required className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 bg-slate-50" value={form.dept} onChange={e=>setForm({...form, dept: e.target.value})}>
                                            <option value="" disabled>-- Dept --</option>
                                            <option value="เบเกอรี">เบเกอรี (Bakery)</option>
                                            <option value="ผักและผลไม้">ผักและผลไม้ (Produce)</option>
                                            <option value="อาหารทะเล">อาหารทะเล (Seafood)</option>
                                            <option value="เนื้อสัตว์">เนื้อสัตว์ (Meat)</option>
                                            <option value="ผลิตภัณฑ์แช่แข็ง">ผลิตภัณฑ์แช่แข็ง (Frozen)</option>
                                        </select>
                                    )}
                                    <button disabled={loading} type="submit" className="w-full bg-slate-800 text-white p-3 rounded-xl font-bold hover:bg-slate-900 mt-2 transition">{t.btnCreate}</button>
                                </form>
                                <hr className="my-4 border-slate-100"/>
                                <h3 className="font-bold text-sm mb-2 text-emerald-700 uppercase tracking-wide">Bulk Upload (Excel)</h3>
                                <label className="block w-full text-center p-4 border-2 border-dashed border-emerald-300 bg-emerald-50 rounded-xl cursor-pointer hover:bg-emerald-100 transition mt-2">
                                    <span className="text-emerald-700 font-bold">{loading ? 'Loading...' : '📥 Select Excel File'}</span>
                                    <input type="file" accept=".xlsx, .xls" onChange={handleExcelUpload} disabled={loading} className="hidden" />
                                </label>
                            </div>
                            
                            <div className="bg-white p-6 rounded-2xl shadow-sm border lg:col-span-2">
                                <div className="flex justify-between items-center mb-4 gap-2 flex-wrap">
                                    <h3 className="font-bold text-lg text-slate-800">{t.taskList}</h3>
                                    <div className="flex gap-2 w-full md:w-auto">
                                        <input 
                                            type="text" 
                                            placeholder={t.searchPlaceholder}
                                            value={taskSearchQuery}
                                            onChange={(e) => setTaskSearchQuery(e.target.value)}
                                            className="bg-slate-50 border p-2 rounded-lg outline-none text-sm w-full md:w-48 focus:border-blue-500 focus:bg-white transition"
                                        />
                                        <button onClick={() => loadData(false)} disabled={loading} className="text-sm bg-slate-100 text-slate-700 px-3 py-1 rounded-lg border hover:bg-slate-200 transition">🔄 Refresh</button>
                                    </div>
                                </div>
                                <div className="max-h-[600px] overflow-y-auto space-y-4 pr-2 hide-scroll">
                                    {groupedTasks.length === 0 && <p className="text-center text-slate-400 py-8 border-2 border-dashed rounded-xl">No tasks available / ไม่พบรหัสสินค้าที่ค้นหา</p>}
                                    {groupedTasks.map((group, idx) => {
                                        const percent = group.total === 0 ? 0 : Math.round((group.done / group.total) * 100);
                                        return (
                                            <div key={idx} className="border border-slate-200 rounded-xl overflow-hidden shadow-sm bg-white">
                                                <div className="bg-slate-50 p-3 flex justify-between items-center border-b border-slate-200">
                                                    <div>
                                                        <span className="font-bold text-blue-900 bg-blue-100 px-2 py-1 rounded text-xs mr-2">{group.dept}</span>
                                                        <span className="font-bold text-slate-700 text-sm">Aisle: {group.aisle} | Bay: {group.bay}</span>
                                                    </div>
                                                    <div className="text-xs font-bold bg-white px-2 py-1 rounded-lg text-slate-700 shadow-sm border">
                                                        {group.done} / {group.total} ({percent}%)
                                                    </div>
                                                </div>
                                                <div className="w-full bg-slate-200 h-1.5"><div className={`h-1.5 transition-all duration-500 ${percent === 100 ? 'bg-emerald-500' : 'bg-blue-500'}`} style={{ width: `${percent}%` }}></div></div>
                                                <div className="p-2 bg-white max-h-48 overflow-y-auto hide-scroll">
                                                    {group.tasks.map(task => (
                                                        <div key={task.TaskID} className="flex justify-between items-center p-2 border-b border-slate-50 last:border-0 text-sm hover:bg-slate-50 transition">
                                                            <span className="text-slate-700 font-medium">Article: {task.Article}</span>
                                                            <span className={`px-2 py-0.5 rounded text-xs font-bold ${task.Status === 'Pending' ? 'bg-orange-100 text-orange-700' : 'bg-emerald-100 text-emerald-700'}`}>{task.Status}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'tasks' && previewTasks && (
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-blue-200">
                            <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                                <div><h3 className="font-bold text-xl text-blue-800">Preview Bulk Data</h3><p className="text-sm text-slate-500">{previewTasks.length} Records Found</p></div>
                                <div className="flex gap-2">
                                    <button onClick={() => setPreviewTasks(null)} disabled={loading} className="px-6 py-3 bg-slate-100 text-slate-700 rounded-xl font-bold">Cancel</button>
                                    <button onClick={confirmBulkUpload} disabled={loading} className="px-6 py-3 bg-emerald-600 text-white rounded-xl font-bold">{loading ? 'Processing...' : '✅ Confirm Upload'}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'report' && (
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                                <h3 className="font-bold text-lg">{t.viewReport}</h3>
                                <div className="flex items-center gap-2 flex-wrap">
                                    <input 
                                        type="text" 
                                        placeholder={t.searchPlaceholder}
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        className="bg-white border-2 border-blue-100 p-2 rounded-lg outline-none text-sm w-full md:w-56 focus:border-blue-500 transition shadow-sm"
                                    />
                                    <select value={filterDept} onChange={e => setFilterDept(e.target.value)} className="bg-slate-50 border p-2 rounded-lg outline-none text-sm cursor-pointer">
                                        <option value="">All Dept</option>
                                        {uniqueDepts.map(dept => (<option key={dept} value={dept}>{dept}</option>))}
                                    </select>
                                    <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="bg-slate-50 border p-2 rounded-lg outline-none text-sm" />
                                    <span className="text-slate-400">-</span>
                                    <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="bg-slate-50 border p-2 rounded-lg outline-none text-sm" />
                                    <button onClick={() => { setStartDate(''); setEndDate(''); setFilterDept(''); setSearchQuery(''); }} className="text-sm text-red-500 hover:bg-red-50 px-2 py-1 rounded border border-transparent hover:border-red-200 transition">Clear</button>
                                </div>
                                <button onClick={exportExcel} className="bg-emerald-600 text-white px-4 py-2 rounded-xl font-bold text-sm shadow-sm hover:bg-emerald-700">{t.export}</button>
                            </div>

                            <div className="overflow-x-auto rounded-xl border border-slate-200 hide-scroll max-h-[500px]">
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-slate-100 text-slate-700 sticky top-0 shadow-sm z-10">
                                        <tr>
                                            <th className="p-3">Date</th><th className="p-3">Time</th><th className="p-3">Dept</th>
                                            <th className="p-3">Aisle/Bay</th><th className="p-3">Article</th><th className="p-3">Weight</th>
                                            <th className="p-3">Staff ID</th><th className="p-3">Photo</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {filteredSubmissions.length === 0 ? (
                                            <tr><td colSpan="8" className="text-center p-8 text-slate-400">No data found / ไม่พบข้อมูลที่ค้นหา</td></tr>
                                        ) : (
                                            filteredSubmissions.map((s, idx) => {
                                                const mt = tasks.find(t => String(t.TaskID) === String(s.TaskID)) || {};
                                                return (
                                                    <tr key={idx} className="hover:bg-slate-50 transition">
                                                        <td className="p-3 text-slate-500 whitespace-nowrap">{s.Date || '-'}</td>
                                                        <td className="p-3 text-slate-500 whitespace-nowrap">{s.Time || '-'}</td>
                                                        <td className="p-3 font-medium text-slate-800">{mt.Dept || s.Dept || '-'}</td>
                                                        <td className="p-3 text-blue-600 font-bold">{mt.Aisle || '-'}/{mt.Bay || '-'}</td>
                                                        <td className="p-3 font-bold text-slate-800">{s.Article}</td>
                                                        <td className="p-3 text-emerald-600 font-black">{s.Weight}</td>
                                                        <td className="p-3 text-slate-600">{s.EmpID}</td>
                                                        <td className="p-3">{s.ImageURL && <a href={s.ImageURL} target="_blank" className="text-blue-500 hover:underline font-bold text-xs bg-blue-50 px-2 py-1 rounded">View</a>}</td>
                                                    </tr>
                                                );
                                            })
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
