<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Count System</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-left-color: #e11d48; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* ซ่อน Scrollbar แต่อยู่ให้เลื่อนได้ */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // ⚠️ นำ URL จาก Google Apps Script มาใส่ตรงนี้
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbya6JnNk4OybI_xJl0QZhlCV3n3h5hMKss3RxKi7dODM32Sn5bo2DdXeyNqatEsFVzr/exec";

        const dict = {
            th: {
                sysName: "ระบบจัดการสต็อก", login: "เข้าสู่ระบบ", register: "สมัครสมาชิก", empId: "รหัสพนักงาน", pass: "รหัสผ่าน",
                name: "ชื่อ-นามสกุล", dept: "แผนก", btnLogin: "เข้าสู่ระบบ", btnReg: "สมัครบัญชีใหม่", logout: "ออกจากระบบ", 
                role_Admin: "ผู้ดูแลระบบ", role_Supervisor: "หัวหน้างาน", role_Staff: "พนักงาน",
                createTask: "มอบหมายงานใหม่", article: "รหัสสินค้า", aisle: "Aisle", bay: "Bay", btnCreate: "สร้างงาน",
                taskList: "รายการงาน", status: "สถานะ", viewReport: "ดูรายงานและส่งออก", export: "Export Excel",
                myTasks: "งานของฉัน", countTarget: "เป้าหมายการนับ", weight: "น้ำหนัก (กิโลกรัม)", 
                takePhoto: "📸 ถ่ายภาพสินค้า", retakePhoto: "📸 ถ่ายภาพใหม่", btnSubmit: "บันทึกข้อมูล",
                noTask: "ไม่มีงานค้างอยู่ในขณะนี้", pending: "รอดำเนินการ", done: "เสร็จสิ้น",
                scanToVerify: "สแกน/กรอก รหัสสินค้าเพื่อยืนยัน", lookupBtn: "ค้นหา", productFound: "ชื่อสินค้า", mismatchWarn: "รหัสสินค้าไม่ตรงกับงานที่ได้รับมอบหมาย!"
            },
            en: {
                sysName: "Stock Count System", login: "Login", register: "Register", empId: "Employee ID", pass: "Password",
                name: "Full Name", dept: "Department", btnLogin: "Sign In", btnReg: "Create Account", logout: "Logout", 
                role_Admin: "Admin", role_Supervisor: "Supervisor", role_Staff: "Staff",
                createTask: "Assign Task", article: "Article No.", aisle: "Aisle", bay: "Bay", btnCreate: "Create",
                taskList: "Task List", status: "Status", viewReport: "View Report", export: "Export Excel",
                myTasks: "My Tasks", countTarget: "Counting Target", weight: "Weight (kg)",
                takePhoto: "📸 Take Photo", retakePhoto: "📸 Retake Photo", btnSubmit: "Submit",
                noTask: "No pending tasks at the moment.", pending: "Pending", done: "Done",
                scanToVerify: "Scan/Enter Article to Verify", lookupBtn: "Lookup", productFound: "Product Name", mismatchWarn: "Article mismatch with assigned task!"
            },
            my: {
                sysName: "စတော့ရှယ်ယာရေတွက်စနစ်", login: "လော့ဂ်အင်", register: "မှတ်ပုံတင်မည်", empId: "ဝန်ထမ်း ID", pass: "စကားဝှက်",
                name: "နာမည်အပြည့်အစုံ", dept: "ဌာန", btnLogin: "ဝင်ရောက်ရန်", btnReg: "အကောင့်ဖန်တီးပါ။", logout: "ထွက်မည်", 
                role_Admin: "အက်ဒမင်", role_Supervisor: "ကြီးကြပ်ရေးမှူး", role_Staff: "ဝန်ထမ်း",
                createTask: "အလုပ်ခန့်အပ်ပါ။", article: "ဆောင်းပါးနံပါတ်", aisle: "Aisle", bay: "Bay", btnCreate: "ဖန်တီးပါ။",
                taskList: "အလုပ်စာရင်း", status: "အခြေအနေ", viewReport: "အစီရင်ခံစာကိုကြည့်ပါ။", export: "Excel ထုတ်ယူပါ။",
                myTasks: "ငါ့အလုပ်များ", countTarget: "ပစ်မှတ်", weight: "အလေးချိန် (ကီလိုဂရမ်)",
                takePhoto: "📸 ဓာတ်ပုံရိုက်ပါ။", retakePhoto: "📸 ပြန်ရိုက်ပါ။", btnSubmit: "တင်သွင်းပါ။",
                noTask: "ဆိုင်းငံ့ထားသောအလုပ်မရှိပါ။", pending: "ဆိုင်းငံ့ထားသည်။", done: "ပြီးပြီ",
                scanToVerify: "အတည်ပြုရန်စကင်ဖတ်ပါ။", lookupBtn: "ရှာဖွေပါ။", productFound: "ကုန်ပစ္စည်းအမည်", mismatchWarn: "ဆောင်းပါးသည် ကိုက်ညီမှုမရှိပါ။"
            }
        };

        const { useState, useEffect } = React;

        function App() {
            const [lang, setLang] = useState('th');
            const [user, setUser] = useState(null);
            const t = dict[lang];

            const fetchGAS = async (payload) => {
                const res = await fetch(GAS_URL, {
                    method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                return res.json();
            };

            if (!user) return <AuthScreen t={t} lang={lang} setLang={setLang} setUser={setUser} fetchGAS={fetchGAS} />;

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col">
                    <header className="bg-rose-700 text-white p-4 flex justify-between items-center shadow-md">
                        <div>
                            <h1 className="text-xl font-bold">{t.sysName}</h1>
                            <p className="text-sm opacity-80">{user.name} ({t['role_'+user.role]} - {user.dept})</p>
                        </div>
                        <div className="flex gap-2 items-center">
                            <select value={lang} onChange={e => setLang(e.target.value)} className="bg-rose-800 text-white text-sm p-1 rounded border-none outline-none">
                                <option value="th">🇹🇭 TH</option><option value="en">🇬🇧 EN</option><option value="my">🇲🇲 MM</option>
                            </select>
                            <button onClick={() => setUser(null)} className="text-sm bg-rose-900 px-3 py-1 rounded hover:bg-rose-950">{t.logout}</button>
                        </div>
                    </header>
                    <main className="flex-1 p-4 max-w-4xl w-full mx-auto">
                        {(user.role === 'Admin' || user.role === 'Supervisor') 
                            ? <SupervisorPanel user={user} t={t} fetchGAS={fetchGAS} /> 
                            : <StaffPanel user={user} t={t} fetchGAS={fetchGAS} />
                        }
                    </main>
                </div>
            );
        }

        // ==========================================
        // หน้า Login / Register
        // ==========================================
        function AuthScreen({ t, lang, setLang, setUser, fetchGAS }) {
            const [isReg, setIsReg] = useState(false);
            const [form, setForm] = useState({ empId: '', password: '', name: '', dept: '' });
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const res = await fetchGAS({ action: isReg ? 'register' : 'login', ...form });
                    if (res.success) {
                        if (isReg) { alert(res.message); setIsReg(false); } 
                        else { setUser(res.user); }
                    } else alert(res.message);
                } catch (err) { alert("เกิดข้อผิดพลาดในการเชื่อมต่อ (Network Error)"); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                    <div className="w-full max-w-md bg-white rounded-xl shadow-lg p-6">
                        <div className="flex justify-end mb-4">
                            <select value={lang} onChange={e => setLang(e.target.value)} className="bg-gray-100 text-sm p-1 rounded outline-none border">
                                <option value="th">🇹🇭 ภาษาไทย</option><option value="en">🇬🇧 English</option><option value="my">🇲🇲 မြန်မာ</option>
                            </select>
                        </div>
                        <h2 className="text-2xl font-bold text-gray-800 text-center mb-6">{isReg ? t.register : t.login}</h2>
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input required placeholder={t.empId} className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-rose-500"
                                value={form.empId} onChange={e => setForm({...form, empId: e.target.value})} />
                            
                            {isReg && <input required placeholder={t.name} className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-rose-500"
                                value={form.name} onChange={e => setForm({...form, name: e.target.value})} />}
                            
                            {/* Dropdown สำหรับสมัครสมาชิก */}
                            {isReg && 
                                <select required className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-rose-500 bg-white"
                                    value={form.dept} onChange={e => setForm({...form, dept: e.target.value})}>
                                    <option value="" disabled>-- เลือกแผนก --</option>
                                    <option value="เบเกอรี">เบเกอรี</option>
                                    <option value="ผักและผลไม้">ผักและผลไม้</option>
                                    <option value="อาหารทะเล">อาหารทะเล</option>
                                    <option value="เนื้อสัตว์">เนื้อสัตว์</option>
                                    <option value="อาหารแช่แข็ง">อาหารแช่แข็ง</option>
                                </select>
                            }

                            <input required type="password" placeholder={t.pass} className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-rose-500"
                                value={form.password} onChange={e => setForm({...form, password: e.target.value})} />
                            
                            <button disabled={loading} type="submit" className="w-full bg-rose-600 text-white p-3 rounded-lg font-bold hover:bg-rose-700 flex justify-center items-center">
                                {loading ? <div className="spinner border-l-white"></div> : (isReg ? t.btnReg : t.btnLogin)}
                            </button>
                        </form>
                        <div className="mt-4 text-center">
                            <button type="button" onClick={() => setIsReg(!isReg)} className="text-sm text-rose-600 hover:underline">
                                {isReg ? "มีบัญชีอยู่แล้ว? เข้าสู่ระบบ" : "พนักงานใหม่? สมัครสมาชิก"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // แดชบอร์ด พนักงานนับสต็อก (Staff) 
        // ==========================================
        function StaffPanel({ user, t, fetchGAS }) {
            // (ใช้โค้ดเดิม ไม่มีการแก้ไขในส่วนนี้)
            const [tasks, setTasks] = useState([]);
            const [activeTask, setActiveTask] = useState(null);
            const [loading, setLoading] = useState(false);

            const [scanArticle, setScanArticle] = useState('');
            const [productDetail, setProductDetail] = useState(null);
            const [isLookupLoading, setIsLookupLoading] = useState(false);
            const [isScannerOpen, setIsScannerOpen] = useState(false);

            const [weight, setWeight] = useState('');
            const [imgBase64, setImgBase64] = useState('');

            useEffect(() => { loadTasks(); }, []);

            const loadTasks = async () => {
                setLoading(true);
                const res = await fetchGAS({ action: 'getTasks', role: user.role, dept: user.dept });
                if(res.success) setTasks(res.tasks);
                setLoading(false);
            };

            const resetState = () => {
                setActiveTask(null); setScanArticle(''); setProductDetail(null); setWeight(''); setImgBase64(''); setIsScannerOpen(false);
            };

            const handleLookup = async (manualArticle = scanArticle) => {
                if(!manualArticle) return;
                setIsLookupLoading(true);
                const res = await fetchGAS({ action: 'lookup', article: manualArticle });
                if(res.success) {
                    setProductDetail(res.product);
                } else {
                    alert(res.message);
                    setProductDetail(null);
                }
                setIsLookupLoading(false);
            };

            useEffect(() => {
                if(isScannerOpen) {
                    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 150} }, false);
                    html5QrcodeScanner.render((decodedText) => {
                        setScanArticle(decodedText);
                        html5QrcodeScanner.clear();
                        setIsScannerOpen(false);
                        handleLookup(decodedText);
                    });
                    return () => { html5QrcodeScanner.clear().catch(e => {}); }
                }
            }, [isScannerOpen]);

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => setImgBase64(reader.result);
                reader.readAsDataURL(file);
            };

            const submitTask = async () => {
                if(!weight || !imgBase64) return alert("กรุณากรอกน้ำหนักและถ่ายรูป");
                setLoading(true);
                const res = await fetchGAS({
                    action: 'submitCount', taskId: activeTask.TaskID, empId: user.empId, 
                    article: activeTask.Article, weight: weight, imageBase64: imgBase64
                });
                if(res.success) {
                    alert(t.done);
                    resetState();
                    loadTasks();
                } else alert(res.message);
                setLoading(false);
            };

            if (activeTask) {
                const isMismatch = productDetail && String(productDetail.Article) !== String(activeTask.Article);

                return (
                    <div className="bg-white p-6 rounded-xl shadow-sm border">
                        <button onClick={resetState} className="text-gray-500 mb-4 font-bold">&larr; กลับ</button>
                        
                        <div className="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-100">
                            <h2 className="text-lg font-bold text-blue-900">{t.countTarget}: <span className="text-xl">{activeTask.Article}</span></h2>
                            <p className="text-sm text-blue-800 mt-1">Aisle: <b>{activeTask.Aisle}</b> | Bay: <b>{activeTask.Bay}</b></p>
                        </div>
                        
                        <label className="block text-sm font-bold text-gray-700 mb-2">{t.scanToVerify}</label>
                        
                        <div className="flex gap-2 mb-4">
                            <input type="text" placeholder={t.article} className="flex-1 p-3 border-2 rounded-lg outline-none focus:border-rose-500 text-lg"
                                value={scanArticle} onChange={e => setScanArticle(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleLookup(scanArticle)} />
                            
                            <button onClick={() => setIsScannerOpen(!isScannerOpen)} className="bg-rose-600 text-white px-4 rounded-lg flex items-center justify-center text-xl">
                                📷
                            </button>

                            <button onClick={() => handleLookup(scanArticle)} disabled={isLookupLoading} className="bg-gray-800 text-white px-4 rounded-lg font-bold flex items-center justify-center min-w-[80px]">
                                {isLookupLoading ? <div className="spinner border-l-white"></div> : t.lookupBtn}
                            </button>
                        </div>

                        {isScannerOpen && <div id="reader" className="w-full mb-4 rounded overflow-hidden shadow"></div>}

                        {productDetail && (
                            <div className={`p-4 rounded-lg mb-6 border ${isMismatch ? 'bg-red-50 border-red-200' : 'bg-green-50 border-green-200'}`}>
                                <p className="text-sm text-gray-600 mb-1">{t.productFound}:</p>
                                <p className={`font-bold text-lg ${isMismatch ? 'text-red-700' : 'text-green-700'}`}>{productDetail.Name}</p>
                                {isMismatch && <p className="text-red-600 text-sm font-bold mt-2">⚠️ {t.mismatchWarn}</p>}
                            </div>
                        )}

                        {productDetail && (
                            <div className="animate-[fadeIn_0.3s_ease-in-out]">
                                <input type="number" step="0.01" placeholder={t.weight} className="w-full p-4 border-2 rounded-lg text-xl mb-4 focus:border-rose-500 outline-none"
                                    value={weight} onChange={e => setWeight(e.target.value)} />

                                <label className="block w-full text-center p-6 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50 mb-4 transition">
                                    <span className="text-gray-600 font-medium text-lg">{imgBase64 ? t.retakePhoto : t.takePhoto}</span>
                                    <input type="file" accept="image/*" capture="environment" onChange={handleFile} className="hidden" />
                                </label>

                                {imgBase64 && <img src={imgBase64} alt="Preview" className="w-full h-48 object-cover rounded-lg mb-4 shadow-sm" />}

                                <button onClick={submitTask} disabled={loading || isMismatch} className="w-full bg-green-600 text-white p-4 rounded-lg font-bold text-lg hover:bg-green-700 flex justify-center disabled:opacity-50">
                                    {loading ? <div className="spinner border-l-white"></div> : t.btnSubmit}
                                </button>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div>
                    <h2 className="text-lg font-bold mb-4 text-gray-700">{t.myTasks} ({user.dept})</h2>
                    {loading && <p>Loading...</p>}
                    {!loading && tasks.length === 0 && <div className="p-8 text-center bg-white rounded-xl shadow-sm text-gray-500">{t.noTask}</div>}
                    <div className="grid gap-3">
                        {tasks.map(task => (
                            <div key={task.TaskID} onClick={() => setActiveTask(task)} className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-rose-500 cursor-pointer hover:shadow-md transition flex justify-between items-center">
                                <div>
                                    <div className="font-bold text-lg">{t.article}: {task.Article}</div>
                                    <div className="text-sm text-gray-500">Aisle: {task.Aisle} | Bay: {task.Bay}</div>
                                </div>
                                <div className="bg-rose-100 text-rose-700 px-3 py-1 rounded-full text-xs font-bold">เริ่มนับ &rarr;</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ==========================================
        // แดชบอร์ด หัวหน้างาน (Admin / Supervisor)
        // ==========================================
        function SupervisorPanel({ user, t, fetchGAS }) {
            const [view, setView] = useState('tasks');
            // FIX 1: ให้ค่า default เป็นค่าว่าง (สำหรับ Admin) เพื่อบังคับให้ผู้ใช้เลือก
            const [form, setForm] = useState({ dept: user.role === 'Admin' ? '' : user.dept, article: '', aisle: '', bay: '' });
            const [tasks, setTasks] = useState([]);
            const [submissions, setSubmissions] = useState([]);
            const [loading, setLoading] = useState(false);
            
            // FIX 2: State สำหรับพรีวิวข้อมูล Excel ก่อนส่งมอบหมายงาน
            const [previewTasks, setPreviewTasks] = useState(null);

            useEffect(() => { loadData(); }, [view]);

            const loadData = async () => {
                setLoading(true);
                if(view === 'tasks') {
                    const res = await fetchGAS({ action: 'getTasks', role: user.role, dept: user.dept });
                    if(res.success) setTasks(res.tasks);
                } else {
                    const res = await fetchGAS({ action: 'getSubmissions' });
                    if(res.success) setSubmissions(res.submissions);
                }
                setLoading(false);
            };

            const handleCreate = async (e) => {
                e.preventDefault();
                setLoading(true);
                const res = await fetchGAS({ action: 'createTask', ...form });
                if(res.success) { 
                    alert(res.message); 
                    setForm({...form, article: '', aisle: '', bay: ''}); // เก็บ dept ไว้เหมือนเดิม
                    loadData(); 
                }
                setLoading(false);
            };

            // อัปเดต: อ่าน Excel แล้วนำไปแสดง Preview แทนการยิง API ทันที
            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const data = evt.target.result;
                        const workbook = XLSX.read(data, { type: 'binary' });
                        const firstSheet = workbook.SheetNames[0];
                        const excelRows = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet], { defval: "" });

                        const formattedTasks = excelRows.map(row => {
                            const getVal = (key) => {
                                const foundKey = Object.keys(row).find(k => k.trim().toLowerCase() === key.toLowerCase());
                                return foundKey ? row[foundKey] : '';
                            };
                            return {
                                aisle: getVal('Aisle'),
                                bay: getVal('Bay'),
                                dept: getVal('Dept'),
                                article: getVal('Article')
                            };
                        }).filter(t => String(t.article).trim() !== '');

                        if(formattedTasks.length === 0) {
                            alert("ไม่พบข้อมูลสินค้าในไฟล์ Excel หรือหัวคอลัมน์ไม่ตรง (ต้องการ: Aisle, Bay, Dept, Article)");
                            e.target.value = null;
                            return;
                        }

                        // เปลี่ยนหน้าเป็นหน้าต่างพรีวิว
                        setPreviewTasks(formattedTasks);

                    } catch(err) {
                        alert("ไฟล์ Excel ไม่ถูกต้อง หรือไม่สามารถอ่านได้");
                    }
                    e.target.value = null; // reset input เพื่อให้สามารถเลือกไฟล์เดิมซ้ำได้ถ้ายกเลิก
                };
                reader.readAsBinaryString(file);
            };

            // ฟังก์ชันกดยืนยันจากหน้าพรีวิว (ยิง API จริง)
            const confirmBulkUpload = async () => {
                setLoading(true);
                
                // ตั้งค่า Controller เพื่อจับเวลา หากเกิน 30 วินาทีให้ตัดการเชื่อมต่อ
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000); 
            
                try {
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        signal: controller.signal,
                        body: JSON.stringify({ action: 'createTasksBulk', tasks: previewTasks }),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    
                    clearTimeout(timeoutId);
                    
                    const data = await res.json();
                    if (data.success) {
                        alert("อัปโหลดสำเร็จ!");
                        setPreviewTasks(null);
                        loadData();
                    } else {
                        alert("เกิดข้อผิดพลาดจาก Server: " + data.message);
                    }
                } catch (err) {
                    if (err.name === 'AbortError') {
                        alert("การเชื่อมต่อหมดเวลา (Timeout) กรุณาตรวจสอบอินเทอร์เน็ตหรือลองใหม่อีกครั้ง");
                    } else {
                        alert("ไม่สามารถเชื่อมต่อกับ Google Apps Script ได้: " + err.message);
                    }
                } finally {
                    setLoading(false);
                }
            };

            const exportExcel = () => {
                const dataToExport = submissions.map(s => {
                    const dateOnly = s.Date ? String(s.Date).split(' ')[0] : '';
                    const matchedTask = tasks.find(t => String(t.TaskID) === String(s.TaskID)) || {};
                    return {
                        "Stock take : ": dateOnly,
                        "Stock take : 1": "1",
                        "Aisle": matchedTask.Aisle || "N/A",
                        "Bay": matchedTask.Bay || "N/A",
                        "Article": s.Article,
                        "Quantity": s.Weight
                    };
                });
                const ws = XLSX.utils.json_to_sheet(dataToExport);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Report");
                XLSX.writeFile(wb, "StockCount_Report.xlsx");
            };

            return (
                <div>
                    <div className="flex gap-2 mb-6">
                        <button onClick={()=>setView('tasks')} className={`flex-1 py-2 rounded-lg font-bold transition-colors ${view==='tasks'?'bg-rose-600 text-white shadow-md':'bg-white text-gray-600 border'}`}>มอบหมายงาน</button>
                        <button onClick={()=>setView('report')} className={`flex-1 py-2 rounded-lg font-bold transition-colors ${view==='report'?'bg-rose-600 text-white shadow-md':'bg-white text-gray-600 border'}`}>ดูรายงาน</button>
                    </div>

                    {/* ซ่อนหน้าจอมอบหมายงานปกติ หากอยู่ในโหมด Preview Excel */}
                    {view === 'tasks' && !previewTasks && (
                        <div className="grid md:grid-cols-2 gap-6">
                            
                            {/* ฟอร์มสร้างงาน 1 รายการ */}
                            <div className="bg-white p-6 rounded-xl shadow-sm border">
                                <h3 className="font-bold text-lg mb-4">{t.createTask} (ทีละรายการ)</h3>
                                <form onSubmit={handleCreate} className="space-y-3 mb-6">
                                    <input required placeholder={t.article} className="w-full p-3 border rounded outline-none focus:border-rose-500" value={form.article} onChange={e=>setForm({...form, article: e.target.value})} />
                                    <div className="flex gap-2">
                                        <input required placeholder={t.aisle} className="w-full p-3 border rounded outline-none focus:border-rose-500" value={form.aisle} onChange={e=>setForm({...form, aisle: e.target.value})} />
                                        <input required placeholder={t.bay} className="w-full p-3 border rounded outline-none focus:border-rose-500" value={form.bay} onChange={e=>setForm({...form, bay: e.target.value})} />
                                    </div>
                                    
                                    {/* FIX 1: แก้ไขช่องป้อนข้อมูลเป็น Dropdown แบบเลือกแผนกปลายทาง */}
                                    {user.role === 'Admin' && (
                                        <select required className="w-full p-3 border rounded outline-none focus:border-rose-500 bg-white"
                                            value={form.dept} onChange={e=>setForm({...form, dept: e.target.value})}>
                                            <option value="" disabled>-- เลือกแผนกปลายทาง --</option>
                                            <option value="เบเกอรี">เบเกอรี</option>
                                            <option value="ผักและผลไม้">ผักและผลไม้</option>
                                            <option value="อาหารทะเล">อาหารทะเล</option>
                                            <option value="เนื้อสัตว์">เนื้อสัตว์</option>
                                            <option value="อาหารแช่แข็ง">อาหารแช่แข็ง</option>
                                        </select>
                                    )}
                                    <button disabled={loading} type="submit" className="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700 mt-2">{t.btnCreate}</button>
                                </form>

                                <hr className="my-4"/>

                                {/* ระบบสร้างงานแบบกลุ่มจาก Excel */}
                                <h3 className="font-bold text-lg mb-2 text-green-700">อัปโหลดงานจาก Excel</h3>
                                <p className="text-sm text-gray-500 mb-3">ไฟล์ต้องมีหัวคอลัมน์: Aisle, Bay, Dept, Article</p>
                                
                                <label className="block w-full text-center p-4 border-2 border-dashed border-green-300 bg-green-50 rounded-lg cursor-pointer hover:bg-green-100 transition">
                                    <span className="text-green-700 font-bold">{loading ? 'กำลังอ่านไฟล์...' : '📥 เลือกไฟล์ Excel (.xlsx)'}</span>
                                    <input type="file" accept=".xlsx, .xls" onChange={handleExcelUpload} disabled={loading} className="hidden" />
                                </label>
                            </div>
                            
                            <div className="bg-white p-6 rounded-xl shadow-sm border">
                                <h3 className="font-bold text-lg mb-4">{t.taskList}</h3>
                                <div className="max-h-[500px] overflow-y-auto space-y-2 pr-2">
                                    {tasks.map(task => (
                                        <div key={task.TaskID} className="p-3 border rounded flex justify-between items-center text-sm bg-gray-50">
                                            <div>
                                                <div className="font-bold text-base text-gray-800">{task.Article}</div>
                                                <div className="text-gray-500 mt-1">Aisle: {task.Aisle} | Bay: {task.Bay} | Dept: {task.Dept}</div>
                                            </div>
                                            <span className={`px-3 py-1 rounded-full text-xs font-bold ${task.Status === 'Pending' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}`}>
                                                {task.Status}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* FIX 2: หน้าต่างพรีวิวข้อมูลก่อนกดยืนยันสร้างงาน (จะแสดงเมื่อมีการเลือกไฟล์แล้วเท่านั้น) */}
                    {view === 'tasks' && previewTasks && (
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-blue-200">
                            <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                                <div>
                                    <h3 className="font-bold text-xl text-blue-800">พรีวิวข้อมูลเตรียมแจกงาน</h3>
                                    <p className="text-sm text-gray-500">พบข้อมูลที่อ่านได้ทั้งหมด <span className="font-bold text-lg text-rose-600">{previewTasks.length}</span> รายการ</p>
                                </div>
                                <div className="flex gap-2 w-full md:w-auto">
                                    <button onClick={() => setPreviewTasks(null)} disabled={loading} className="flex-1 md:flex-none px-6 py-3 bg-gray-200 text-gray-700 rounded-lg font-bold hover:bg-gray-300 transition">
                                        ย้อนกลับ / ยกเลิก
                                    </button>
                                    <button onClick={confirmBulkUpload} disabled={loading} className="flex-1 md:flex-none px-6 py-3 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700 transition flex justify-center items-center">
                                        {loading ? <div className="spinner border-l-white mr-2"></div> : '✅ ยืนยันการแจกงาน'}
                                    </button>
                                </div>
                            </div>
                            
                            <div className="max-h-[500px] overflow-y-auto border rounded-lg bg-gray-50 hide-scroll">
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-blue-100 text-blue-900 sticky top-0 shadow-sm">
                                        <tr>
                                            <th className="p-3">ลำดับ</th>
                                            <th className="p-3">รหัสสินค้า (Article)</th>
                                            <th className="p-3">แผนก (Dept)</th>
                                            <th className="p-3">Aisle</th>
                                            <th className="p-3">Bay</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y bg-white">
                                        {previewTasks.map((t, idx) => (
                                            <tr key={idx} className="hover:bg-gray-50">
                                                <td className="p-3 text-gray-400">{idx + 1}</td>
                                                <td className="p-3 font-bold text-gray-800">{t.article}</td>
                                                <td className="p-3 text-blue-600 font-medium">{t.dept}</td>
                                                <td className="p-3">{t.aisle}</td>
                                                <td className="p-3">{t.bay}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {view === 'report' && (
                        <div className="bg-white p-6 rounded-xl shadow-sm border">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-bold text-lg">{t.viewReport}</h3>
                                <button onClick={exportExcel} className="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-sm hover:bg-green-700 flex items-center gap-2">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                    {t.export}
                                </button>
                            </div>
                            <div className="overflow-x-auto rounded-lg border">
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-gray-100 text-gray-600 border-b">
                                        <tr>
                                            <th className="p-3">Date</th>
                                            <th className="p-3">Article</th>
                                            <th className="p-3">Weight</th>
                                            <th className="p-3">Emp</th>
                                            <th className="p-3">Photo</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {submissions.map((s, idx) => (
                                            <tr key={idx} className="hover:bg-gray-50">
                                                <td className="p-3 text-gray-500 whitespace-nowrap">{s.Date}</td>
                                                <td className="p-3 font-bold text-gray-800">{s.Article}</td>
                                                <td className="p-3 text-rose-600 font-bold">{s.Weight}</td>
                                                <td className="p-3">{s.EmpID}</td>
                                                <td className="p-3">
                                                    {s.ImageURL && <a href={s.ImageURL} target="_blank" className="text-blue-600 hover:underline font-medium">ดูรูป</a>}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
